name: Version Bump

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'
      skip_ci:
        description: 'Skip CI checks before release'
        type: boolean
        default: false

jobs:
  version-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        if: ${{ !inputs.skip_ci }}
        run: npm run typecheck

      - name: Run build
        if: ${{ !inputs.skip_ci }}
        run: npm run build

      - name: Bump version
        id: version_bump
        run: |
          # Bump version in package.json
          NEW_VERSION=$(npm version ${{ inputs.version_type }} --no-git-tag-version)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version=${NEW_VERSION#v}" >> $GITHUB_OUTPUT
          echo "📦 New version: $NEW_VERSION"

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ steps.version_bump.outputs.version }}"
          DATE=$(date +%Y-%m-%d)

          # Create CHANGELOG if it doesn't exist
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "All notable changes to this project will be documented in this file." >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          # Prepare new entry
          {
            echo "## [$VERSION] - $DATE"
            echo ""
            echo "### Added"
            echo "- "
            echo ""
            echo "### Changed"
            echo "- "
            echo ""
            echo "### Fixed"
            echo "- "
            echo ""
          } > CHANGELOG_NEW.md

          # Insert after "# Changelog" header
          sed -i '/# Changelog/r CHANGELOG_NEW.md' CHANGELOG.md
          rm CHANGELOG_NEW.md

      - name: Commit changes
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.version_bump.outputs.version }}

          Release type: ${{ inputs.version_type }}"

      - name: Create and push tag
        run: |
          git tag ${{ steps.version_bump.outputs.new_version }}
          git push origin main
          git push origin ${{ steps.version_bump.outputs.new_version }}

      - name: Summary
        run: |
          echo "## ✅ Version Bump Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**New Version:** \`${{ steps.version_bump.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ steps.version_bump.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The release workflow should trigger automatically." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Edit the CHANGELOG.md with actual changes" >> $GITHUB_STEP_SUMMARY
          echo "2. Wait for the release workflow to complete" >> $GITHUB_STEP_SUMMARY
          echo "3. Edit the GitHub release notes if needed" >> $GITHUB_STEP_SUMMARY
